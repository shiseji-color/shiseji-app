<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拾色季 | AI色彩诊断</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
    }
    .page {
      width: 100vw;
      max-width: 100%;
      min-height: 100vh;
      padding: 28px 20px;
      display: none;
    }
    #page-entry {
      display: block;
      text-align: center;
      padding-top: 60px;
    }
    #page-entry h2 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    #page-entry p {
      font-size: 15px;
      color: #666;
      margin-bottom: 40px;
    }
    button {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      border-radius: 14px;
      border: none;
      background: #007AFF;
      color: white;
      margin-top: 14px;
    }
    #video {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 20px;
    }
    #page-report {
      text-align: center;
    }
    #page-report h3 {
      font-size: 22px;
      margin-bottom: 24px;
    }
    .report-content {
      width: 100%;
      padding: 30px 20px;
      background: #f8f9fa;
      border-radius: 14px;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

<!-- 入口页 -->
<div id="page-entry" class="page">
  <h2>拾色季 | AI色彩诊断</h2>
  <p>精准定位你的专属色彩</p>

  <input 
    id="photoInput"
    type="file"
    accept="image/*"
    capture="user"
    onclick="this.removeAttribute('capture')"
    style="display: none;"
  >
  <button onclick="photoInput.click()">从相册选择</button>
  <button onclick="startCamera()">直接拍照</button>
</div>

<!-- 拍照页 -->
<div id="page-camera" class="page">
  <video id="video" autoplay playsinline></video>
  <button onclick="takePhoto()">确认拍照</button>
  <button onclick="showPage('entry')">返回</button>
</div>

<!-- 报告页 -->
<div id="page-report" class="page">
  <h3>你的专属色彩报告</h3>
  <div class="report-content" id="reportCard">
    <p>肤色类型：暖皮</p>
    <p>适合色系：橘色、棕色、金色</p>
    <p>风格：自然、温暖、高级</p>
  </div>

  <button onclick="saveToAlbum()">保存到相册</button>
  <button onclick="showPage('entry')">重新诊断</button>
</div>

<!-- html2canvas 长图生成 -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
  let currentPage = 'entry';
  let video = document.getElementById('video');
  let photoInput = document.getElementById('photoInput');

  // 页面切换
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(`page-${page}`).style.display = 'block';
    currentPage = page;
  }

  // 打开摄像头（默认前置）
  async function startCamera() {
    showPage('camera');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' }
      });
      video.srcObject = stream;
    } catch (e) {
      alert('摄像头权限异常，请允许相机权限');
      showPage('entry');
    }
  }

  // 拍照完成
  function takePhoto() {
    showPage('report');
  }

  // 相册选择后直接进报告
  photoInput.onchange = () => {
    if (photoInput.files.length) {
      showPage('report');
    }
  }

  // 一键保存到相册（长图）
  async function saveToAlbum() {
    const card = document.getElementById('reportCard');
    const canvas = await html2canvas(card, { useCORS: true, scale: 2 });
    const link = document.createElement('a');
    link.download = '拾色季_你的色彩报告.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    alert('报告已保存到相册');
  }
</script>

</body>
</html>

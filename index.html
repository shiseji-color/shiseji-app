<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拾色季 | 高定 AI 色彩美学诊断</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;900&display=swap');
        :root { --primary-bg: #F7F5F2; --accent-color: #DABFB4; --text-dark: #3D342F; --text-muted: #8C7A70; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; background-color: var(--primary-bg); background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png'); touch-action: manipulation; overflow-x: hidden; }
        .font-serif-custom { font-family: 'Noto Serif SC', serif; }
        .glass-panel { background: linear-gradient(145deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.75) 100%); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); box-shadow: 0 24px 80px rgba(160, 145, 130, 0.2), inset 0 1px 1px rgba(255,255,255,1); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 2.5rem; }
        .content-card { background: #FFFFFF; border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02); border: 1px solid rgba(240, 235, 230, 0.9); position: relative; overflow: hidden; }
        .fade-in { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .stagger-1 { animation-delay: 0.1s; opacity: 0; animation-fill-mode: both; } .stagger-2 { animation-delay: 0.2s; opacity: 0; animation-fill-mode: both; } .stagger-3 { animation-delay: 0.3s; opacity: 0; animation-fill-mode: both; } .stagger-4 { animation-delay: 0.4s; opacity: 0; animation-fill-mode: both; }
        .premium-loader { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
        .loader-ring { position: absolute; border-radius: 50%; border: 1.5px solid var(--accent-color); animation: ripple 2.5s infinite cubic-bezier(0.21, 0.53, 0.56, 0.8); }
        .loader-ring:nth-child(2) { animation-delay: 0.8s; } .loader-ring:nth-child(3) { animation-delay: 1.6s; }
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 100%; height: 100%; opacity: 0; } }
        .hex-color-swatch { box-shadow: inset 0 2px 8px rgba(0,0,0,0.06); border: 2px solid #FFFFFF; }
        .progress-bar-fill { transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .app-container { height: 90vh; height: 90dvh; }
        @media (max-width: 480px) { body { padding: 0 !important; } .app-container { height: 100vh; height: 100dvh; border-radius: 0; border: none; max-width: 100%; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-3 text-[#4A403A]">

<div class="relative w-full max-w-md app-container glass-panel flex flex-col overflow-hidden">
    <header class="pt-10 pb-4 px-8 text-center shrink-0 z-10 bg-gradient-to-b from-white to-white/0">
        <h1 class="text-[28px] font-serif-custom font-semibold text-[#3D342F] tracking-[0.25em] ml-1">拾色季</h1>
    </header>

    <div class="flex-1 overflow-y-auto px-6 pb-12" id="mainContainer">
        <div id="step-activation" class="fade-in mt-8">
            <div class="content-card p-8">
                <input type="text" id="activationCode" placeholder="输入密钥" class="w-full bg-[#F9F8F6] border border-[#EBE6E0] p-4 text-center tracking-[0.3em] rounded-[1rem] outline-none">
                <button onclick="verifyCode()" class="w-full text-white bg-[#4A403A] rounded-[1rem] py-4 mt-6 tracking-[0.2em]">开启专属测试</button>
            </div>
        </div>

        <div id="step-upload" class="hidden fade-in mt-6">
            <div class="content-card p-8 text-center">
                <label for="dropzone-file" class="block cursor-pointer">
                    <img id="imagePreview" src="" class="w-full h-48 object-cover rounded-[1rem] hidden mb-4" alt="Preview">
                    <div id="uploadText" class="py-12 border-2 border-dashed rounded-[1rem] text-[#8C7A70]">从相册选取照片</div>
                </label>
                <input id="dropzone-file" type="file" class="hidden" onchange="handleImageUpload(event)" />
            </div>
        </div>

        <div id="step-loading" class="hidden fade-in mt-32 flex flex-col items-center">
            <div class="premium-loader mb-10"><div class="loader-ring"></div><div class="loader-ring"></div><div class="loader-ring"></div></div>
            <h3 id="loadingText" class="text-[15px] font-serif-custom">系统正在唤醒...</h3>
        </div>

        <div id="step-result" class="hidden fade-in">
            <div id="captureArea" class="space-y-5 pb-4 pt-2 bg-[var(--primary-bg)] px-1">
                <div class="content-card p-8 text-center fade-in stagger-1">
                    <img id="userAvatarResult" src="" class="w-20 h-20 rounded-full mx-auto mb-4 hidden" alt="avatar">
                    <h2 id="res-season-name" class="text-3xl font-bold font-serif-custom"></h2>
                    <h3 id="res-season-en" class="text-sm text-gray-400 italic"></h3>
                    <p id="res-desc" class="text-sm mt-4 text-justify leading-relaxed"></p>
                </div>
                <div class="content-card p-6 fade-in stagger-2"><div class="text-center mb-4 text-sm font-semibold">面部色值提取</div><div class="grid grid-cols-4 gap-2" id="res-hex-extraction"></div></div>
                <div class="content-card p-6 fade-in stagger-3"><div class="relative w-full h-[190px]"><canvas id="radarChart"></canvas></div></div>
                <div class="content-card p-6 fade-in stagger-4"><div class="text-center mb-4 text-sm font-semibold">专属天命色彩</div><div class="grid grid-cols-4 gap-2" id="res-best-colors"></div></div>
                <div class="content-card p-6 space-y-4 text-xs fade-in stagger-4">
                    <div><b>妆容：</b><span id="res-makeup"></span></div>
                    <div><b>穿搭：</b><span id="res-outfit"></span></div>
                    <div><b>饰品：</b><span id="res-accessory"></span></div>
                    <div><b>明星：</b><span id="res-celebrity"></span></div>
                    <div class="text-red-400"><b>避雷：</b><span id="res-avoid"></span></div>
                </div>
            </div>
            <button id="saveBtn" onclick="saveAsImage()" class="w-full text-white bg-[#4A403A] py-4 rounded-[1rem] mt-6 tracking-widest">生成长图</button>
        </div>
    </div>
</div>

<div id="customAlert" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 hidden opacity-0 transition-opacity"><div class="bg-white p-7 rounded-[1.5rem] w-[80%] max-w-sm text-center"><p id="alertMessage" class="text-[#4A403A]"></p><button onclick="closeCustomAlert()" class="mt-6 w-full py-3 bg-[#F4EFEA] rounded-lg">知道了</button></div></div>
<div id="saveOverlay" class="fixed inset-0 z-[200] bg-black/90 hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity"><img id="saveOverlayImg" class="max-w-full max-h-[70vh] mb-4 rounded-lg"><button onclick="closeSaveOverlay()" class="text-white border px-8 py-2 rounded-full">关闭</button></div>

<script>
    let userImageBase64 = "";
    window.currentCode = ""; 

    function showCustomAlert(m) {
        document.getElementById('alertMessage').innerText = m;
        const modal = document.getElementById('customAlert');
        modal.classList.remove('hidden');
        setTimeout(() => modal.classList.remove('opacity-0'), 10);
    }
    function closeCustomAlert() { document.getElementById('customAlert').classList.add('opacity-0'); setTimeout(() => document.getElementById('customAlert').classList.add('hidden'), 300); }

    // 🔥 升级版防伪锁 🔥
    function verifyCode() {
        const input = document.getElementById('activationCode').value.trim().toUpperCase();
        const masterKeys = ['VIP888', 'MY666', 'SHISEJI2026'];
        const isValid = input.startsWith('SSJ') && input.length === 7;
        if (masterKeys.includes(input) || isValid) {
            window.currentCode = input;
            document.getElementById('step-activation').classList.add('hidden');
            document.getElementById('step-upload').classList.remove('hidden');
        } else { showCustomAlert("密钥无效，请重新输入"); }
    }

    // 🔥 压缩版图片上传引擎 🔥
    function handleImageUpload(event) {
        const file = event.target.files[0];
        if(!file) return;
        document.getElementById('uploadText').innerText = "图片压缩中...";
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height;
                const MAX = 800;
                if (width > MAX || height > MAX) {
                    if (width > height) { height *= MAX / width; width = MAX; }
                    else { width *= MAX / height; height = MAX; }
                }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                userImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('imagePreview').src = userImageBase64;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('uploadText').classList.add('hidden');
                setTimeout(startAnalysis, 600);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function startAnalysis() {
        document.getElementById('step-upload').classList.add('hidden');
        document.getElementById('step-loading').classList.remove('hidden');
        fetch('/.netlify/functions/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ imageBase64: userImageBase64 })
        })
        .then(res => res.json())
        .then(data => {
            renderAIResult(data);
            document.getElementById('step-loading').classList.add('hidden');
            document.getElementById('step-result').classList.remove('hidden');
        })
        .catch(e => { showCustomAlert('网络异常或图片过大'); document.getElementById('step-upload').classList.remove('hidden'); document.getElementById('step-loading').classList.add('hidden'); });
    }

    function renderAIResult(d) {
        if(userImageBase64) { document.getElementById('userAvatarResult').src = userImageBase64; document.getElementById('userAvatarResult').classList.remove('hidden'); }
        document.getElementById('res-season-name').innerText = d.season_name;
        document.getElementById('res-season-en').innerText = d.season_en;
        document.getElementById('res-desc').innerText = d.description;
        document.getElementById('res-makeup').innerText = d.makeup_advice;
        document.getElementById('res-outfit').innerText = d.outfit_advice;
        document.getElementById('res-accessory').innerText = d.accessory_advice;
        document.getElementById('res-celebrity').innerText = d.celebrity_reference;
        document.getElementById('res-avoid').innerText = Array.isArray(d.avoid_colors) ? d.avoid_colors.join(", ") : d.avoid_colors;
        
        const f = document.getElementById('res-hex-extraction'); f.innerHTML = '';
        d.feature_colors.forEach(c => f.innerHTML += `<div class="flex flex-col items-center"><div class="w-10 h-10 rounded-full hex-color-swatch" style="background:${c.hex}"></div><span class="text-[9px] mt-1">${c.label}</span></div>`);
        
        const c = document.getElementById('res-best-colors'); c.innerHTML = '';
        d.best_colors.forEach(b => c.innerHTML += `<div class="flex flex-col items-center"><div class="w-12 h-12 rounded-full hex-color-swatch" style="background:${b.hex}"></div><span class="text-[9px] mt-1">${b.name}</span></div>`);

        new Chart(document.getElementById('radarChart'), { type: 'radar', data: { labels: ['冷暖','明度','彩度','清浊','对比'], datasets: [{ data: d.radar_data.map(v=>v.value), backgroundColor: '#DABFB4' }] }, options: { plugins: { legend: false } } });
    }

    // 🔥 影分身长图渲染 🔥
    async function saveAsImage() {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "生成中...";
        const area = document.getElementById('captureArea');
        const clone = area.cloneNode(true);
        clone.style.position = 'absolute'; clone.style.top = '0'; clone.style.left = '0'; clone.style.width = area.offsetWidth + 'px'; clone.style.height = 'auto'; clone.style.zIndex = '-9999';
        document.body.appendChild(clone);
        const canvas = await html2canvas(clone, { scale: 2, useCORS: true, backgroundColor: '#F7F5F2' });
        document.body.removeChild(clone);
        document.getElementById('saveOverlayImg').src = canvas.toDataURL('image/jpeg', 0.95);
        document.getElementById('saveOverlay').classList.remove('hidden');
        document.getElementById('saveOverlay').classList.add('flex');
        setTimeout(() => document.getElementById('saveOverlay').classList.remove('opacity-0'), 10);
        btn.innerText = "生成专属长图海报";
    }
    function closeSaveOverlay() { document.getElementById('saveOverlay').classList.add('opacity-0'); setTimeout(() => document.getElementById('saveOverlay').classList.add('hidden'), 300); }
</script>
</body>
</html>

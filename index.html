<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾色季 | 高定 AI 色彩美学诊断</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #F7F5F2;
            -webkit-font-smoothing: antialiased;
            height: 100%;
        }
        .page-container {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            margin: 0 auto;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 20px 60px rgba(180,165,150,0.15);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
        }
        .step {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }
        .step.active {
            display: block !important;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03);
        }
        input, button {
            width: 100%;
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            border: 1px solid #EBE6E0;
            outline: none;
            margin-bottom: 16px;
        }
        button {
            background: #3B332E;
            color: white;
            border: none;
            font-weight: 500;
        }
        .upload-box {
            border: 2px dashed #E8E1DE;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
        }
        #cameraVideo {
            width: 100%;
            height: auto;
            background: #000;
            border-radius: 16px;
        }
        .flex {
            display: flex;
        }
        .gap-4 {
            gap: 16px;
        }
        .justify-center {
            justify-content: center;
        }
        .text-center {
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        #captureArea {
            width: 100%;
        }

        /* 还原原版加载页样式 */
        .loading-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 40px;
        }
        .loading-title {
            font-size: 20px;
            color: #3D342F;
            margin-bottom: 40px;
            letter-spacing: 0.1em;
        }
        .loading-animation {
            position: relative;
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
        }
        .loading-circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid #DABFB4;
            border-radius: 50%;
            opacity: 0;
            animation: ripple 2s infinite cubic-bezier(0.21, 0.53, 0.56, 0.8);
        }
        .loading-circle:nth-child(1) {
            animation-delay: 0s;
        }
        .loading-circle:nth-child(2) {
            animation-delay: 0.8s;
        }
        .loading-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #DABFB4;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes ripple {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            100% {
                width: 60px;
                height: 60px;
                opacity: 0;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        }
        .loading-text {
            font-size: 12px;
            color: #8C7A70;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .loading-eng {
            font-size: 10px;
            color: #BFA89F;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="page-container">
    <!-- 激活页 -->
    <div id="step-activation" class="step active">
        <div class="card">
            <div class="text-center">
                <h2>唤醒原生美学</h2>
                <p>输入您的专属色彩密钥</p>
            </div>
            <input type="text" id="activationCode" placeholder="输入密钥">
            <button onclick="verifyCode()">开启专属测试</button>
        </div>
    </div>

    <!-- 上传页 -->
    <div id="step-upload" class="step">
        <div class="card">
            <h2 class="text-center">遇见真实的自己</h2>
            <p class="text-center">请在自然光下拍摄素颜照</p>
            <label class="upload-box" onclick="document.getElementById('dropzone-file').click()">
                <p>从相册选择照片</p>
            </label>
            <input type="file" id="dropzone-file" accept="image/*" onchange="handleImageUpload(event)" class="hidden">
        </div>
    </div>

    <!-- 拍照页 -->
    <div id="step-camera" class="step">
        <div class="card">
            <h2 class="text-center">对准面部拍摄</h2>
            <video id="cameraVideo" autoplay playsinline></video>
            <div class="flex gap-4">
                <button onclick="closeCamera()">取消</button>
                <button onclick="capturePhoto()">拍摄</button>
            </div>
        </div>
    </div>

    <!-- 加载页（还原原版视觉） -->
    <div id="step-loading" class="step">
        <div class="loading-wrap">
            <h2 class="loading-title">拾色季</h2>
            <div class="loading-animation">
                <div class="loading-circle"></div>
                <div class="loading-circle"></div>
                <div class="loading-dot"></div>
            </div>
            <p class="loading-text">正在提取肤色与瞳孔 HEX 色值...</p>
            <p class="loading-eng">AI ENGINE PROCESSING</p>
        </div>
    </div>

    <!-- 结果页 -->
    <div id="step-result" class="step">
        <div id="captureArea">
            <div class="card">
                <h2 class="text-center">柔秋型</h2>
                <p class="text-center">您的肌肤基调偏暖，适合莫兰迪色系</p>
            </div>
        </div>
        <button onclick="saveAsImage()">保存报告到相册</button>
    </div>
</div>

<script>
    let userImageBase64 = "";
    let cameraStream = null;

    function goToStep(id) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function verifyCode() {
        goToStep('step-upload');
    }

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            userImageBase64 = e.target.result;
            goToStep('step-loading');
            setTimeout(() => {
                goToStep('step-result');
            }, 2000);
        };
        reader.readAsDataURL(file);
    }

    async function openCamera() {
        goToStep('step-camera');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user' }
            });
            cameraStream = stream;
            document.getElementById('cameraVideo').srcObject = stream;
        } catch (e) {
            alert("请开启相机权限");
            goToStep('step-upload');
        }
    }

    function closeCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
            cameraStream = null;
        }
        goToStep('step-upload');
    }

    function capturePhoto() {
        const video = document.getElementById('cameraVideo');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        userImageBase64 = canvas.toDataURL('image/png');
        closeCamera();
        goToStep('step-loading');
        setTimeout(() => {
            goToStep('step-result');
        }, 2000);
    }

    async function saveAsImage() {
        try {
            const captureArea = document.getElementById('captureArea');
            const canvas = await html2canvas(captureArea, { scale: 2, useCORS: true });
            const isMobile = /Android|iPhone|iPad|iPod/.test(navigator.userAgent);
            if (isMobile) {
                const img = new Image();
                img.src = canvas.toDataURL('image/png');
                img.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;object-fit:contain;background:#F7F5F2;z-index:9999';
                document.body.appendChild(img);
                alert('长按图片 → 保存到相册');
                img.onclick = () => img.remove();
            } else {
                canvas.toBlob(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = '色彩报告.png';
                    a.click();
                });
            }
        } catch (e) {
            alert('保存失败，请截图');
        }
    }
</script>

</body>
</html>

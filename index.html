<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾色季 | 高定 AI 色彩美学诊断</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #F7F5F2;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        .page {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 20px 16px;
        }
        .page.active {
            display: block;
        }
        .glass-panel {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(180,165,150,0.1);
        }
        .content-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid rgba(240,235,230,0.8);
        }
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.2,0.8,0.2,1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input, button {
            width: 100%;
            box-sizing: border-box;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            outline: none;
        }
        button {
            background: #4A403A;
            color: white;
            border: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        button:active {
            transform: scale(0.98);
            background: #3D342F;
        }
        input {
            background: #F9F8F6;
            border: 1px solid #EBE6E0;
            text-align: center;
            letter-spacing: 0.15em;
            color: #4A403A;
        }
        .img-upload {
            width: 100%;
            aspect-ratio: 1;
            background: #F9F8F6;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 16px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        .img-upload::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .img-upload.has-img::after {
            opacity: 1;
        }
        .upload-text {
            position: relative;
            z-index: 10;
            color: #8C7A70;
            font-size: 14px;
        }
        .text-title {
            font-size: 18px;
            font-weight: 600;
            color: #3D342F;
            text-align: center;
        }
        .text-desc {
            font-size: 13px;
            color: #8C7A70;
            text-align: center;
            margin-top: 6px;
            line-height: 1.5;
        }
        .text-error {
            font-size: 12px;
            color: #D98A8A;
            text-align: center;
            margin-top: 8px;
        }
        .hidden {
            display: none !important;
        }

        /* 统一弹窗 */
        #customAlert {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #customAlert.show {
            display: flex;
        }
        .alert-box {
            background: white;
            width: 82%;
            max-width: 330px;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .alert-body {
            padding: 32px 20px;
            text-align: center;
            font-size: 15px;
            color: #4A403A;
            line-height: 1.5;
        }
        .alert-footer {
            border-top: 1px solid #F4EFEA;
        }
        .alert-btn {
            width: 100%;
            padding: 16px;
            background: white;
            color: #DABFB4;
            font-weight: 600;
            border: none;
            font-size: 16px;
        }
    </style>
</head>

<body>

<!-- 1 激活码 -->
<div class="page active fade-in" id="step-activation">
    <div class="glass-panel">
        <div class="content-card">
            <div class="text-title">拾色季 · 色彩诊断</div>
            <div class="text-desc mt-2">输入兑换码，开启专属美学分析</div>

            <input id="activationCode" type="text" placeholder="请输入兑换码" class="mt-6">
            <div id="codeError" class="text-error hidden">兑换码无效或次数已用完</div>

            <button class="mt-6" onclick="verifyCode()">确认使用</button>
        </div>
    </div>
</div>

<!-- 2 上传 -->
<div class="page fade-in" id="step-upload">
    <div class="glass-panel">
        <div class="content-card">
            <div class="text-title">上传照片</div>
            <div class="text-desc">自然光 · 素颜 · 正脸</div>

            <div class="img-upload mt-6" id="imgPreview" onclick="document.getElementById('fileInput').click()">
                <div class="upload-text" id="uploadTip">点击选择照片</div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="selectFile(event)">

            <button onclick="startAnalysis()">开始分析</button>
            <button onclick="goStep('activation')" style="background:#F9F8F6; color:#4A403A; margin-top:10px;">返回</button>
        </div>
    </div>
</div>

<!-- 3 加载 -->
<div class="page fade-in" id="step-loading">
    <div class="glass-panel">
        <div class="content-card text-center">
            <div class="text-title">AI 正在分析</div>
            <div class="text-desc mt-2">请稍候 3～6 秒</div>
        </div>
    </div>
</div>

<!-- 4 结果 -->
<div class="page fade-in" id="step-result">
    <div class="glass-panel">
        <div class="content-card">
            <div class="text-title">你的专属色彩报告</div>
            <div id="resultText" class="text-desc mt-4" style="text-align:left; line-height:1.7;">分析完成</div>

            <button class="mt-6" onclick="saveResult()">保存报告</button>
            <button onclick="goStep('upload')" style="background:#F9F8F6; color:#4A403A; margin-top:10px;">再次检测</button>
        </div>
    </div>
</div>

<!-- 弹窗 -->
<div id="customAlert">
    <div class="alert-box">
        <div class="alert-body" id="alertMsg">提示</div>
        <div class="alert-footer">
            <button class="alert-btn" onclick="closeAlert()">确定</button>
        </div>
    </div>
</div>

<script>
    let currentCode = "";
    let imgBase64 = "";

    // 页面切换
    function goStep(step) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const el = document.getElementById('step-' + step);
        if (el) el.classList.add('active');
    }

    // 选择图片
    function selectFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function () {
            imgBase64 = reader.result;
            const prev = document.getElementById('imgPreview');
            prev.style.backgroundImage = `url(${imgBase64})`;
            prev.classList.add('has-img');
            document.getElementById('uploadTip').innerText = '已选择照片';
        };
        reader.readAsDataURL(file);
    }

    // 次数逻辑（本机）
    function getRemain(code) {
        const k = "color_code_" + code;
        const v = localStorage.getItem(k);
        if (v == null) {
            localStorage.setItem(k, 6);
            return 6;
        }
        return parseInt(v);
    }
    function useOnce(code) {
        const r = getRemain(code);
        if (r <= 0) return 0;
        localStorage.setItem("color_code_" + code, r - 1);
        return r - 1;
    }

    // 验证兑换码
    function verifyCode() {
        const code = document.getElementById('activationCode').value.trim();
        if (!code) {
            showAlert("请输入兑换码");
            return;
        }
        const rem = getRemain(code);
        if (rem <= 0) {
            document.getElementById('codeError').classList.remove('hidden');
            return;
        }
        document.getElementById('codeError').classList.add('hidden');
        currentCode = code;
        goStep('upload');
    }

    // 开始分析
    function startAnalysis() {
        if (!currentCode) {
            showAlert("请先输入兑换码");
            return;
        }
        if (!imgBase64) {
            showAlert("请选择照片");
            return;
        }
        goStep('loading');

        setTimeout(() => {
            const left = useOnce(currentCode);
            showAlert(`分析成功！剩余 ${left} 次`);
            document.getElementById('resultText').innerText = 
                "你的季型：暖春型\n\n适合色系：暖色系、明亮清透色系、珊瑚色、蜜瓜色、奶油色等。\n\n妆容建议：暖调底妆、蜜桃色眼影、橘色系口红。";
            goStep('result');
        }, 3500);
    }

    // 弹窗
    function showAlert(msg) {
        document.getElementById('alertMsg').innerText = msg;
        document.getElementById('customAlert').classList.add('show');
    }
    function closeAlert() {
        document.getElementById('customAlert').classList.remove('show');
    }

    // 保存
    function saveResult() {
        showAlert("报告已生成，请长按保存");
    }
</script>

</body>
</html>
